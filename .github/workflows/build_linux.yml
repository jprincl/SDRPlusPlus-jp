name: Build Linux

on:
    workflow_call:
        inputs:
            base_image:
                required: true
                type: string
            runner:
                required: true
                type: string
            artifact:
                required: true
                type: string
            volk_package:
                required: false
                type: string
                default: 'libvolk2-dev'
            extra_apt:
                required: false
                type: string
                default: ''
            curl_source:
                required: false
                type: string
                default: 'system'
            version_full:
                required: true
                type: string

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ${{ inputs.runner }}

        steps:
        - uses: actions/checkout@v5

        # The .pkg_cache lives inside the source tree, which the docker run
        # below bind-mounts into the container, so the container reads/writes
        # through to the same path. No destdir cache here — deps are rebuilt
        # fresh inside each Docker image.
        - name: Cache deps
          uses: ./.github/actions/deps-cache

        - name: Create Docker Image
          run: docker build --build-arg BASE_IMAGE=${{ inputs.base_image }} -f $GITHUB_WORKSPACE/docker_builds/Dockerfile $GITHUB_WORKSPACE/docker_builds --tag sdrpp_build

        - name: Run Container
          run: |
            docker run --name build \
              -v $GITHUB_WORKSPACE:/root/SDRPlusPlus \
              --env VOLK_PACKAGE="${{ inputs.volk_package }}" \
              --env EXTRA_APT="${{ inputs.extra_apt }}" \
              --env CURL_SOURCE="${{ inputs.curl_source }}" \
              --env VERSION_FULL="${{ inputs.version_full }}" \
              sdrpp_build /root/do_build.sh

        # The container writes into the bind-mounted source tree as root,
        # so the resulting files (including newly downloaded tarballs in
        # deps/.pkg_cache/) are owned by root on the runner host. The
        # actions/cache post-step runs as the runner user and can't read
        # them; restore ownership so the cache save at job end works.
        - name: Restore deps cache file ownership
          if: always()
          run: sudo chown -R $(id -u):$(id -g) deps/.pkg_cache 2>/dev/null || true

        # Renamed to the artifact name here (rather than in create_full_archive)
        # so the file inside the artifact already has its final published name.
        - name: Recover Deb Archive
          working-directory: ${{ runner.workspace }}
          run: docker cp build:/root/SDRPlusPlus/sdrpp_debian_pkg.deb ./${{ inputs.artifact }}.deb

        - name: Save Deb Archive
          uses: actions/upload-artifact@v6
          with:
              name: ${{ inputs.artifact }}
              path: ${{ runner.workspace }}/${{ inputs.artifact }}.deb
