name: Build Ubuntu Deb

# Standalone, manually-triggered build of just the Ubuntu 24.04 (noble)
# amd64 .deb package. Exists so a desktop package can be produced without
# running the full "Build Binaries" workflow, which fans out across ~16
# Linux variants plus Windows, macOS and Android and hogs the runner queue.
#
# This calls the same reusable build_linux.yml that Build Binaries uses, so
# the resulting package is identical to the one that workflow would produce
# for this distribution - it just skips everything else.

on:
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            version_full: ${{ steps.read.outputs.version_full }}
        steps:
        - uses: actions/checkout@v5
          with:
            # Full history: get_version.sh derives the version from git describe.
            fetch-depth: 0

        - name: Read version
          id: read
          run: |
            eval "$(scripts/get_version.sh "$GITHUB_WORKSPACE")"
            echo "version_full=$VERSION_FULL" >> $GITHUB_OUTPUT

    build_deb:
        needs: [prepare]
        uses: ./.github/workflows/build_linux.yml
        with:
            base_image: ubuntu:noble
            runner: ubuntu-latest
            artifact: sdrpp-jp-${{ needs.prepare.outputs.version_full }}-ubuntu-noble-amd64
            volk_package: libvolk-dev
            extra_apt: ''
            curl_source: system
            version_full: ${{ needs.prepare.outputs.version_full }}

    # Also built here because the .deb cannot be installed alongside an
    # existing upstream SDR++ package: both install /usr/bin/sdrpp, so dpkg
    # refuses. Everything else is already namespaced (package sdrpp-iak,
    # /usr/share/sdrpp-iak, /usr/lib/sdrpp-iak/plugins, sdrpp-iak.desktop),
    # and AppImage builds even get their own config dir on purpose - so the
    # AppImage is the side-by-side option.
    build_appimage:
        needs: [prepare]
        uses: ./.github/workflows/build_appimage.yml
        with:
            runner: ubuntu-latest
            arch: x86_64
            artifact: sdrpp-jp-${{ needs.prepare.outputs.version_full }}-linux-appimage-x86_64
            version_full: ${{ needs.prepare.outputs.version_full }}
