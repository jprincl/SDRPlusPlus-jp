name: Build Android

on:
    workflow_call:
        inputs:
            version_full:
                required: true
                type: string
        secrets:
            ANDROID_KEYSTORE_BASE64:
                required: false
            ANDROID_KEYSTORE_PASSWORD:
                required: false
            ANDROID_KEY_ALIAS:
                required: false
            ANDROID_KEY_PASSWORD:
                required: false

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Install build tools
          run: |
            sudo apt update -y
            sudo apt install -y wget git p7zip-full openjdk-17-jdk build-essential cmake patchelf python3-mako

        # Provision Gradle 9.4.1 (pinned to match android/build.gradle's AGP
        # 9.2.1) ahead of install_android_devenv.sh so the script's gradle
        # detect-and-skip block short-circuits, and so subsequent steps that
        # invoke `gradle` find it on PATH. The action also caches Gradle's
        # user home (~/.gradle/caches, daemon JVMs) across runs.
        - name: Set up Gradle
          uses: gradle/actions/setup-gradle@v6
          with:
              gradle-version: 9.4.1

        # Shared across every workflow in the repo — tarballs are byte-identical
        # regardless of target platform, URL_HASH validates correctness at
        # extraction. The same key in every workflow means Android, Linux,
        # macOS, and Windows all hit the same cache entry: a curl tarball
        # downloaded by one workflow is reused by the next instead of being
        # re-fetched. Restore-keys keep tarballs accumulating across recipe
        # edits — additions to .pkg_cache never conflict, URL_HASH guards
        # against stale content.
        - name: Cache deps download tarballs
          uses: actions/cache@v4
          with:
              path: deps/.pkg_cache
              key: deps-pkgcache-${{ hashFiles('deps/+**/*.cmake', 'deps/cmake/**/*.cmake', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
              restore-keys: |
                  deps-pkgcache-

        # Cache the deps install prefix per ABI/config. Exact-match only — a
        # partial restore would leave stale artifacts that don't match the
        # current recipe hash. The recipe-hash marker autobuild.cmake writes
        # into destdir/share/sdrpp-deps/ also guards against bad restores
        # (mismatched hash forces a rebuild). Path glob covers all
        # build-android-<abi>-<config> dirs so one cache step covers the
        # cross-product of ABIs and build types gradle drives in one run.
        - name: Cache deps install prefixes (Android)
          uses: actions/cache@v4
          with:
              path: |
                  deps/build-android-*/destdir
              key: deps-destdir-android-${{ hashFiles('deps/+**', 'deps/cmake/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json', 'cmake/sdrpp_collect_required_deps.cmake', 'android/app/build.gradle') }}

        - name: Install Android development environment
          run: bash ./install_android_devenv.sh

        - name: Build Debug APKs
          working-directory: ${{ github.workspace }}/android
          run: gradle --info -PoptBuildDeps=ON assembleArmDebug assembleX86Debug

        - name: Save ARM Debug APK
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ inputs.version_full }}-android-arm-debug
              path: ${{ github.workspace }}/android/app/build/outputs/apk/arm/debug/sdrpp-iak-arm-debug.apk

        - name: Save x86 Debug APK
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ inputs.version_full }}-android-x86-debug
              path: ${{ github.workspace }}/android/app/build/outputs/apk/x86/debug/sdrpp-iak-x86-debug.apk

        - name: Decode Keystore
          id: check_signing
          run: |
            if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
              echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{runner.workspace}}/release.keystore
              echo "has_keystore=true" >> $GITHUB_OUTPUT
            else
              echo "has_keystore=false" >> $GITHUB_OUTPUT
            fi
          env:
            ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

        - name: Build Signed Release APKs
          if: steps.check_signing.outputs.has_keystore == 'true'
          env:
            ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
            ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
            ANDROID_KEYSTORE_FILE: ${{ runner.workspace }}/release.keystore
          working-directory: ${{ github.workspace }}/android
          run: gradle --info -PoptBuildDeps=ON assembleArmRelease assembleX86Release

        - name: Save ARM Release APK
          if: steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ inputs.version_full }}-android-arm-release
              path: ${{ github.workspace }}/android/app/build/outputs/apk/arm/release/sdrpp-iak-arm-release.apk

        - name: Save x86 Release APK
          if: steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ inputs.version_full }}-android-x86-release
              path: ${{ github.workspace }}/android/app/build/outputs/apk/x86/release/sdrpp-iak-x86-release.apk
