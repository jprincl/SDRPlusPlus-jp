name: Build Android

on:
    workflow_call:
        inputs:
            version_full:
                required: true
                type: string
            include_debug:
                required: false
                type: boolean
                default: false
            build_bundle:
                description: Force-build the signed Play Store .aab. Otherwise it builds only on release tags.
                required: false
                type: boolean
                default: false
        secrets:
            ANDROID_KEYSTORE_BASE64:
                required: false
            ANDROID_KEYSTORE_PASSWORD:
                required: false
            ANDROID_KEY_ALIAS:
                required: false
            ANDROID_KEY_PASSWORD:
                required: false
    workflow_dispatch:
        inputs:
            version_full:
                description: Optional artifact version override. Defaults to version.h.
                required: false
                type: string
            include_debug:
                description: Build Debug APKs in addition to signed Release APKs.
                required: false
                type: boolean
                default: true
            build_bundle:
                description: Build the signed Play Store .aab bundle.
                required: false
                type: boolean
                default: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            # Don't abort the sibling build_type job if one fails — a failure is
            # usually specific to one build type and we want diagnostics for the
            # other too.
            fail-fast: false
            matrix:
                # We now compile a single all-ABI 'universal' package (see the
                # productFlavors{} block in android/app/build.gradle) instead of
                # one job per arch: Google Play needs a single all-ABI bundle
                # anyway, and the two GitHub-release APKs are split out of the
                # universal APK afterwards. Only the build type still fans out —
                # Debug cells are opt-in (manual runs default to including them,
                # build_all calls stay Release-only).
                build_type: ${{ inputs.include_debug && fromJSON('["debug", "release"]') || fromJSON('["release"]') }}

        steps:
        # Full history: get_version.sh needs the release tags to derive the
        # version suffix when a manual run doesn't pass version_full.
        - uses: actions/checkout@v5
          with:
              fetch-depth: 0

        # Derive the values later steps need from this matrix cell. Release APKs
        # are published without a build-type suffix, Debug APKs get -debug. The
        # bundle is release-only and, unless forced via build_bundle, tag-only.
        - name: Resolve version and artifact names
          id: names
          env:
              INPUT_VERSION_FULL: ${{ inputs.version_full }}
              BUILD_TYPE: ${{ matrix.build_type }}
              REF_TYPE: ${{ github.ref_type }}
              BUILD_BUNDLE_INPUT: ${{ inputs.build_bundle }}
          run: |
            VERSION_FULL="$INPUT_VERSION_FULL"
            if [ -z "$VERSION_FULL" ]; then
              eval "$(scripts/get_version.sh "$GITHUB_WORKSPACE")"
            fi
            if [ "$BUILD_TYPE" = "debug" ]; then
              ARTIFACT_SUFFIX="-debug"
            else
              ARTIFACT_SUFFIX=""
            fi
            # The bundle is Play-only: release build type, and (tag OR forced).
            WANT_BUNDLE=false
            if [ "$BUILD_TYPE" = "release" ] && { [ "$REF_TYPE" = "tag" ] || [ "$BUILD_BUNDLE_INPUT" = "true" ]; }; then
              WANT_BUNDLE=true
            fi
            {
              echo "version_full=${VERSION_FULL}"
              echo "build_type_caps=${BUILD_TYPE^}"
              echo "want_bundle=${WANT_BUNDLE}"
              echo "arm_artifact=sdrpp-iak-${VERSION_FULL}-android-arm${ARTIFACT_SUFFIX}"
              echo "x86_artifact=sdrpp-iak-${VERSION_FULL}-android-x86${ARTIFACT_SUFFIX}"
              # Named outside the sdrpp-iak-* glob so build_all's create_full_archive
              # never sweeps the bundle onto the GitHub release.
              echo "aab_artifact=playstore-aab-${VERSION_FULL}"
              echo "aab=sdrpp-iak-${VERSION_FULL}-android.aab"
            } >> "$GITHUB_OUTPUT"

        - name: Install build tools
          run: |
            sudo apt update -y
            sudo apt install -y wget git zip unzip p7zip-full openjdk-17-jdk build-essential cmake patchelf python3-mako

        # Provision Gradle 9.4.1 (pinned to match android/build.gradle's AGP
        # 9.2.1) ahead of install_android_devenv.sh so the script's gradle
        # detect-and-skip block short-circuits, and so subsequent steps that
        # invoke `gradle` find it on PATH. The action also caches Gradle's
        # user home (~/.gradle/caches, daemon JVMs) across runs.
        - name: Set up Gradle
          uses: gradle/actions/setup-gradle@v6
          with:
              gradle-version: 9.4.1

        # Per-build_type install-prefix cache. The universal package builds all
        # four ABIs, so the glob covers every build-android-<abi>-<Config> deps
        # destdir for this build type.
        - name: Cache deps
          uses: ./.github/actions/deps-cache
          with:
              destdir-path: deps/build-android-*-${{ steps.names.outputs.build_type_caps }}/destdir
              key-suffix: android-universal-${{ steps.names.outputs.build_type_caps }}
              extra-hash-file: android/app/build.gradle

        - name: Install Android development environment
          run: bash ./install_android_devenv.sh

        # Release-only: decode the signing keystore if the secret is present.
        # has_keystore controls whether the Release build / split / upload steps
        # run — repos without the secret (forks, PRs) skip the release path
        # cleanly. Manual runs with include_debug=true still produce Debug APKs
        # (signed with the committed debug keystore).
        - name: Decode keystore
          id: check_signing
          if: matrix.build_type == 'release'
          run: |
            if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
              echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{ runner.workspace }}/release.keystore
              echo "has_keystore=true" >> $GITHUB_OUTPUT
            else
              echo "has_keystore=false" >> $GITHUB_OUTPUT
            fi
          env:
            ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

        # Compile the universal (all-ABI) package once. assembleUniversal<Type>
        # yields the fat APK we split per platform below; bundleUniversalRelease
        # (release + tag/forced only) yields the Play Store .aab — both share the
        # single native build, so nothing is compiled twice.
        - name: Build universal ${{ matrix.build_type }} package
          if: matrix.build_type == 'debug' || steps.check_signing.outputs.has_keystore == 'true'
          working-directory: ${{ github.workspace }}/android
          env:
            BUILD_TYPE_CAPS: ${{ steps.names.outputs.build_type_caps }}
            WANT_BUNDLE: ${{ steps.names.outputs.want_bundle }}
            ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
            ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
            ANDROID_KEYSTORE_FILE: ${{ runner.workspace }}/release.keystore
          run: |
            TASKS="assembleUniversal${BUILD_TYPE_CAPS}"
            if [ "$WANT_BUNDLE" = "true" ]; then
              TASKS="$TASKS bundleUniversalRelease"
            fi
            gradle --info -PoptBuildDeps=ON $TASKS

        # Split the one universal APK into the two per-arch APKs by deleting the
        # other platform's ABI folders, re-page-aligning the archive, and
        # re-signing. Release uses the upload keystore; Debug uses the committed
        # debug keystore. Output names follow the usual convention
        # (sdrpp-iak-<ver>-android-{arm,x86}[-debug].apk).
        - name: Split universal APK into per-platform APKs
          if: matrix.build_type == 'debug' || steps.check_signing.outputs.has_keystore == 'true'
          working-directory: ${{ github.workspace }}/android/app/build/outputs/apk/universal/${{ matrix.build_type }}
          env:
            BUILD_TYPE: ${{ matrix.build_type }}
            VERSION_FULL: ${{ steps.names.outputs.version_full }}
            ANDROID_KEYSTORE_FILE: ${{ runner.workspace }}/release.keystore
            ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
            ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          run: |
            set -euo pipefail
            BUILD_TOOLS="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/*/ | sort -V | tail -1)"
            UNIVERSAL="sdrpp-iak-universal-${BUILD_TYPE}.apk"

            if [ "$BUILD_TYPE" = "debug" ]; then
              SUFFIX="-debug"
              KS="$GITHUB_WORKSPACE/android/app/debug.keystore"
              KS_PASS="android"; KS_ALIAS="androiddebugkey"; KEY_PASS="android"
            else
              SUFFIX=""
              KS="$ANDROID_KEYSTORE_FILE"
              KS_PASS="$ANDROID_KEYSTORE_PASSWORD"; KS_ALIAS="$ANDROID_KEY_ALIAS"; KEY_PASS="$ANDROID_KEY_PASSWORD"
            fi

            # $1 = platform label, remaining args = ABI globs to delete.
            split_one() {
              local platform="$1"; shift
              local out="sdrpp-iak-${VERSION_FULL}-android-${platform}${SUFFIX}.apk"
              cp "$UNIVERSAL" stripped.apk
              # `zip -d` leaves the surviving (STORED, uncompressed) .so entries as
              # they are but shifts their offsets, so re-align afterwards.
              zip -q -d stripped.apk "$@"
              # -P 16: 16 KiB page alignment, matching what AGP emits for API 23+.
              "${BUILD_TOOLS}zipalign" -f -P 16 4 stripped.apk aligned.apk
              "${BUILD_TOOLS}apksigner" sign \
                --ks "$KS" --ks-pass "pass:$KS_PASS" \
                --ks-key-alias "$KS_ALIAS" --key-pass "pass:$KEY_PASS" \
                --out "$out" aligned.apk
              rm -f stripped.apk stripped.apk.idsig aligned.apk aligned.apk.idsig
              echo "== $out =="
              unzip -l "$out" | grep 'lib/' || true
            }
            split_one arm 'lib/x86/*' 'lib/x86_64/*'
            split_one x86 'lib/armeabi-v7a/*' 'lib/arm64-v8a/*'

        - name: Save arm ${{ matrix.build_type }} APK
          if: matrix.build_type == 'debug' || steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v6
          with:
              name: ${{ steps.names.outputs.arm_artifact }}
              path: ${{ github.workspace }}/android/app/build/outputs/apk/universal/${{ matrix.build_type }}/${{ steps.names.outputs.arm_artifact }}.apk

        - name: Save x86 ${{ matrix.build_type }} APK
          if: matrix.build_type == 'debug' || steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v6
          with:
              name: ${{ steps.names.outputs.x86_artifact }}
              path: ${{ github.workspace }}/android/app/build/outputs/apk/universal/${{ matrix.build_type }}/${{ steps.names.outputs.x86_artifact }}.apk

        # Play Store bundle: renamed to its final published name, uploaded under a
        # non-sdrpp-iak-* artifact name so it stays off the GitHub release and is a
        # standalone download for manual Play Console upload.
        - name: Rename AAB
          if: steps.names.outputs.want_bundle == 'true' && steps.check_signing.outputs.has_keystore == 'true'
          working-directory: ${{ github.workspace }}/android/app/build/outputs/bundle/universalRelease
          run: mv app-universal-release.aab ${{ steps.names.outputs.aab }}

        - name: Save AAB
          if: steps.names.outputs.want_bundle == 'true' && steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v6
          with:
              name: ${{ steps.names.outputs.aab_artifact }}
              path: ${{ github.workspace }}/android/app/build/outputs/bundle/universalRelease/${{ steps.names.outputs.aab }}
