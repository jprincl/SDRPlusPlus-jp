name: Build macOS

on:
    workflow_call:
        inputs:
            runner:
                required: true
                type: string
            artifact:
                required: true
                type: string
            preset:
                required: true
                type: string

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ${{ inputs.runner }}

        steps:
        - uses: actions/checkout@v5

        - name: Install build tools
          run: brew install pkg-config autoconf automake libtool p7zip && pip3 install mako --break-system-packages

        - name: Cache deps
          uses: ./.github/actions/deps-cache
          with:
              destdir-path: deps/build-default-Release/destdir
              key-suffix: macos-${{ inputs.runner }}

        - name: Prepare CMake
          working-directory: ${{ github.workspace }}
          run: cmake --preset ${{ inputs.preset }}

        - name: Build
          working-directory: ${{ github.workspace }}
          run: cmake --build build --verbose -j3

        # The zip is named after the artifact so the file inside already has
        # its final published name and create_full_archive can merge every
        # build's output by pattern, without a per-artifact rename table.
        - name: Create Archive
          working-directory: ${{ github.workspace }}
          run: |
              cmake --build build --target stage_macos_bundle
              cd build/stage/macos-bundle/Release
              zip -r "${{ runner.workspace }}/${{ inputs.artifact }}.zip" SDR++-iak.app

        - name: Save Archive
          uses: actions/upload-artifact@v6
          with:
              name: ${{ inputs.artifact }}
              path: ${{ runner.workspace }}/${{ inputs.artifact }}.zip
