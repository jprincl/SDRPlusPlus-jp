name: Build Binaries

on:
    push:
        branches-ignore:
        - nightly
        tags:
        - 'v[0-9]*.[0-9]*.[0-9]*'
    pull_request:
        branches-ignore:
        - nightly
    workflow_dispatch:

permissions:
  contents: write    # Required for creating releases and uploading files
  actions: read      # Standard workflow permission

env:
    # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
    BUILD_TYPE: Release
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    get_version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.read.outputs.version }}
            version_full: ${{ steps.read.outputs.version_full }}
        steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Read version
          id: read
          run: |
            version=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)[0-9]*)?"' core/src/version.h | tr -d '"')
            echo "version=$version" >> $GITHUB_OUTPUT
            describe=$(git describe --tags --long --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
            if [ -n "$describe" ]; then
              build_info=$(echo "$describe" | grep -oE '[0-9]+-g[0-9a-f]+$')
              count=$(echo "$build_info" | grep -oE '^[0-9]+')
            else
              count=$(git rev-list --count HEAD)
              hash=$(git rev-parse --short HEAD)
              build_info="${count}-g${hash}"
            fi
            if [ "$count" = "0" ]; then
              version_full="$version"
            else
              version_full="${version}+${build_info}"
            fi
            echo "version_full=$version_full" >> $GITHUB_OUTPUT

    detect_changes:
        # On PRs, AppImage builds are gated on whether AppImage-relevant files changed
        # (saves ~30 min of CI on the average PR). On push/tag/dispatch, always build.
        runs-on: ubuntu-latest
        outputs:
            appimage: ${{ steps.filter.outputs.appimage }}
        steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - id: filter
          run: |
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo "appimage=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            BASE="${{ github.event.pull_request.base.sha }}"
            # AppImage packaging depends on:
            #   - the appimage build scripts and reusable workflow
            #   - the orchestrator workflow (matrix changes)
            #   - the desktop file (referenced by linuxdeploy)
            #   - the root and core CMakeLists (install paths, INSTALL_PREFIX define)
            #   - sdrpp_module.cmake (plugin install destination)
            #   - core.cpp (resource/module path resolution + APPDIR override)
            #   - command_args.cpp (config root directory selection)
            #   - core curl/HTTP wrappers and curl-using modules
            #   - the icon resource (referenced by the desktop file)
            if git diff --name-only "$BASE...HEAD" | \
              grep -qE '^(docker_builds/appimage/|deps/|\.github/workflows/build_appimage\.yml|\.github/workflows/build_all\.yml|sdrpp-iak\.desktop|CMakeLists\.txt|core/CMakeLists\.txt|sdrpp_module\.cmake|cmake/sdrpp_collect_required_deps\.cmake|cmake/sdrpp_dep_list_helpers\.cmake|cmake/sdrpp_find_dep\.cmake|core/src/core\.cpp|core/src/command_args\.cpp|core/src/utils/curl_init\.(cpp|h)|core/src/utils/proto/curl_http\.(cpp|h)|misc_modules/spots/|root/res/icons/)'; then
              echo "appimage=true" >> $GITHUB_OUTPUT
            else
              echo "appimage=false" >> $GITHUB_OUTPUT
            fi

    validate_tag:
        # On tag pushes, verify the tag matches the version in version.h before
        # starting expensive platform builds. On non-tag runs this job succeeds
        # as a no-op so build jobs can depend on it uniformly.
        needs: [get_version]
        runs-on: ubuntu-latest
        steps:
        - name: Non-tag build
          if: github.ref_type != 'tag'
          run: echo "Not a tag; no tag validation needed."

        - name: Check tag vs version.h
          if: github.ref_type == 'tag'
          env:
            TAG: ${{ github.ref_name }}
            HEADER_VER: ${{ needs.get_version.outputs.version }}
          run: |
            EXPECTED="v${HEADER_VER}"
            if [ "$TAG" != "$EXPECTED" ]; then
              echo "ERROR: tag '${TAG}' does not match version.h ('${EXPECTED}')"
              exit 1
            fi
            echo "Tag ${TAG} matches version.h — OK"

    build_windows:
        needs: [get_version, validate_tag]
        runs-on: windows-2025-vs2026

        steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install Python package for volk
          shell: pwsh
          run: |
            & "$env:pythonLocation\python.exe" -m pip install --user mako
            & "$env:pythonLocation\python.exe" -c "import sys, mako; print('VOLK Python:', sys.executable); print('Mako:', mako.__version__)"

        # Shared across every workflow in the repo — tarballs are byte-identical
        # regardless of target platform.
        - name: Cache deps download tarballs
          uses: actions/cache@v4
          with:
              path: deps/.pkg_cache
              key: deps-pkgcache-${{ hashFiles('deps/+**/*.cmake', 'deps/cmake/**/*.cmake', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
              restore-keys: |
                  deps-pkgcache-

        - name: Cache deps install prefix (Windows x64)
          uses: actions/cache@v4
          with:
              path: deps/build-default-Release/destdir
              key: deps-destdir-windows-x64-${{ hashFiles('deps/+**', 'deps/cmake/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json', 'cmake/sdrpp_collect_required_deps.cmake', 'cmake/sdrpp_dep_list_helpers.cmake') }}

        - name: Configure
          working-directory: ${{ github.workspace }}
          shell: cmd
          run: |
            call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            cmake --preset msvc-x64-release "-DPython3_EXECUTABLE=%pythonLocation%\python.exe"

        - name: Build
          working-directory: ${{ github.workspace }}
          shell: cmd
          run: |
            call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            cmake --build build-msvc-x64-release --config Release --verbose

        - name: Create Archive
          working-directory: ${{runner.workspace}}
          run: '&($Env:GITHUB_WORKSPACE + "/make_windows_package.ps1") ($Env:GITHUB_WORKSPACE + "/build-msvc-x64-release") ($Env:GITHUB_WORKSPACE + "/root") Release x64'

        - name: Save Archive
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-windows-x64
              path: ${{runner.workspace}}/sdrpp_windows_x64.zip

    build_windows_arm64:
        needs: [get_version, validate_tag]
        runs-on: windows-2025-vs2026

        steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install Python package for volk
          shell: pwsh
          run: |
            & "$env:pythonLocation\python.exe" -m pip install --user mako
            & "$env:pythonLocation\python.exe" -c "import sys, mako; print('VOLK Python:', sys.executable); print('Mako:', mako.__version__)"

        - name: Cache deps download tarballs
          uses: actions/cache@v4
          with:
              path: deps/.pkg_cache
              key: deps-pkgcache-${{ hashFiles('deps/+**/*.cmake', 'deps/cmake/**/*.cmake', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
              restore-keys: |
                  deps-pkgcache-

        - name: Cache deps install prefix (Windows ARM64)
          uses: actions/cache@v4
          with:
              path: deps/build-default-arm64-Release/destdir
              key: deps-destdir-windows-arm64-${{ hashFiles('deps/+**', 'deps/cmake/**', 'deps/CMakeLists.txt', 'deps/CMakePresets.json', 'cmake/sdrpp_collect_required_deps.cmake', 'cmake/sdrpp_dep_list_helpers.cmake') }}

        - name: Configure
          working-directory: ${{ github.workspace }}
          shell: cmd
          run: |
            call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
            cmake --preset msvc-arm64-release "-DPython3_EXECUTABLE=%pythonLocation%\python.exe"

        - name: Build
          working-directory: ${{ github.workspace }}
          shell: cmd
          run: |
            call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
            cmake --build build-msvc-arm64-release --config Release --verbose

        - name: Create Archive
          working-directory: ${{runner.workspace}}
          run: '&($Env:GITHUB_WORKSPACE + "/make_windows_package.ps1") ($Env:GITHUB_WORKSPACE + "/build-msvc-arm64-release") ($Env:GITHUB_WORKSPACE + "/root") Release arm64'

        - name: Save Archive
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-windows-arm64
              path: ${{runner.workspace}}/sdrpp_windows_arm64.zip

    build_macos:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-15-intel
                      artifact_suffix: macos-intel
                      zip_name: sdrpp_macos_intel.zip
                      m17_decoder: 'ON'
                      perseus_source: 'ON'
                    - runner: macos-15
                      artifact_suffix: macos-arm
                      zip_name: sdrpp_macos_arm.zip
                      m17_decoder: 'OFF'
                      perseus_source: 'OFF'
        needs: [get_version, validate_tag]
        uses: ./.github/workflows/build_macos.yml
        with:
            runner: ${{ matrix.runner }}
            artifact: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-${{ matrix.artifact_suffix }}
            zip_name: ${{ matrix.zip_name }}
            m17_decoder: ${{ matrix.m17_decoder }}
            perseus_source: ${{ matrix.perseus_source }}

    build_linux:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - base_image: debian:bullseye
                      runner: ubuntu-latest
                      artifact: debian-bullseye-amd64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: debian:bullseye
                      runner: ubuntu-24.04-arm
                      artifact: debian-bullseye-aarch64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: debian:bookworm
                      runner: ubuntu-latest
                      artifact: debian-bookworm-amd64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: debian:bookworm
                      runner: ubuntu-24.04-arm
                      artifact: debian-bookworm-aarch64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: debian:trixie
                      runner: ubuntu-latest
                      artifact: debian-trixie-amd64
                      volk_package: libvolk-dev
                      extra_apt: ''
                      curl_source: system
                    - base_image: debian:trixie
                      runner: ubuntu-24.04-arm
                      artifact: debian-trixie-aarch64
                      volk_package: libvolk-dev
                      extra_apt: ''
                      curl_source: system
                    - base_image: debian:sid
                      runner: ubuntu-latest
                      artifact: debian-sid-amd64
                      volk_package: libvolk-dev
                      extra_apt: ca-certificates
                      curl_source: system
                    - base_image: debian:sid
                      runner: ubuntu-24.04-arm
                      artifact: debian-sid-aarch64
                      volk_package: libvolk-dev
                      extra_apt: ca-certificates
                      curl_source: system
                    - base_image: ubuntu:focal
                      runner: ubuntu-latest
                      artifact: ubuntu-focal-amd64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: ubuntu:focal
                      runner: ubuntu-24.04-arm
                      artifact: ubuntu-focal-aarch64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: ubuntu:jammy
                      runner: ubuntu-latest
                      artifact: ubuntu-jammy-amd64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: ubuntu:jammy
                      runner: ubuntu-24.04-arm
                      artifact: ubuntu-jammy-aarch64
                      volk_package: libvolk2-dev
                      extra_apt: ''
                      curl_source: bundled
                    - base_image: ubuntu:noble
                      runner: ubuntu-latest
                      artifact: ubuntu-noble-amd64
                      volk_package: libvolk-dev
                      extra_apt: ''
                      curl_source: system
                    - base_image: ubuntu:noble
                      runner: ubuntu-24.04-arm
                      artifact: ubuntu-noble-aarch64
                      volk_package: libvolk-dev
                      extra_apt: ''
                      curl_source: system
        needs: [get_version, validate_tag]
        uses: ./.github/workflows/build_linux.yml
        with:
            base_image: ${{ matrix.base_image }}
            runner: ${{ matrix.runner }}
            artifact: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-${{ matrix.artifact }}
            volk_package: ${{ matrix.volk_package }}
            extra_apt: ${{ matrix.extra_apt }}
            curl_source: ${{ matrix.curl_source }}

    build_appimage:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-latest
                      arch: x86_64
                      artifact_suffix: linux-appimage-x86_64
                    - runner: ubuntu-24.04-arm
                      arch: aarch64
                      artifact_suffix: linux-appimage-aarch64
        needs: [get_version, detect_changes, validate_tag]
        if: needs.detect_changes.outputs.appimage == 'true'
        uses: ./.github/workflows/build_appimage.yml
        with:
            runner: ${{ matrix.runner }}
            arch: ${{ matrix.arch }}
            artifact: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-${{ matrix.artifact_suffix }}
            version_full: ${{ needs.get_version.outputs.version_full }}

    build_android:
        needs: [get_version, validate_tag]
        uses: ./.github/workflows/build_android.yml
        with:
            version_full: ${{ needs.get_version.outputs.version_full }}
        secrets:
            ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
            ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
            ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    create_full_archive:
        needs: [
          'get_version',
          'build_windows',
          'build_windows_arm64',
          'build_macos',
          'build_linux',
          'build_appimage',
          'build_android'
        ]
        # build_appimage may be skipped on PRs that don't touch AppImage files;
        # build_windows_arm64 is treated as optional while ARM64 Windows support
        # stabilizes. In either case we still want the archive for the rest of
        # the platforms.
        if: |
          always() &&
          needs.get_version.result == 'success' &&
          needs.build_windows.result == 'success' &&
          needs.build_macos.result == 'success' &&
          needs.build_linux.result == 'success' &&
          needs.build_android.result == 'success' &&
          (needs.build_appimage.result == 'success' || needs.build_appimage.result == 'skipped') &&
          (needs.build_windows_arm64.result == 'success' || needs.build_windows_arm64.result == 'skipped' || needs.build_windows_arm64.result == 'failure')
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Download All Builds
          uses: actions/download-artifact@v4

        - name: Create Archive
          env:
            VER: ${{ needs.get_version.outputs.version_full }}
          run: |
            mkdir sdrpp_all
            git archive --format=tar.gz --prefix=sdrpp-iak-${VER}/ HEAD -o sdrpp_all/sdrpp-iak-${VER}-source.tar.gz
            mv sdrpp-iak-${VER}-windows-x64/sdrpp_windows_x64.zip                                 sdrpp_all/sdrpp-iak-${VER}-windows-x64.zip
            # ARM64 Windows is optional while support stabilizes.
            [ -d sdrpp-iak-${VER}-windows-arm64 ] && mv sdrpp-iak-${VER}-windows-arm64/sdrpp_windows_arm64.zip sdrpp_all/sdrpp-iak-${VER}-windows-arm64.zip || true
            mv sdrpp-iak-${VER}-macos-intel/sdrpp_macos_intel.zip                                 sdrpp_all/sdrpp-iak-${VER}-macos-intel.zip
            mv sdrpp-iak-${VER}-macos-arm/sdrpp_macos_arm.zip                                     sdrpp_all/sdrpp-iak-${VER}-macos-arm.zip
            mv sdrpp-iak-${VER}-debian-bullseye-amd64/sdrpp_debian_pkg.deb                      sdrpp_all/sdrpp-iak-${VER}-debian-bullseye-amd64.deb
            mv sdrpp-iak-${VER}-debian-bullseye-aarch64/sdrpp_debian_pkg.deb                    sdrpp_all/sdrpp-iak-${VER}-debian-bullseye-aarch64.deb
            mv sdrpp-iak-${VER}-debian-bookworm-amd64/sdrpp_debian_pkg.deb                      sdrpp_all/sdrpp-iak-${VER}-debian-bookworm-amd64.deb
            mv sdrpp-iak-${VER}-debian-bookworm-aarch64/sdrpp_debian_pkg.deb                    sdrpp_all/sdrpp-iak-${VER}-debian-bookworm-aarch64.deb
            mv sdrpp-iak-${VER}-debian-trixie-amd64/sdrpp_debian_pkg.deb                        sdrpp_all/sdrpp-iak-${VER}-debian-trixie-amd64.deb
            mv sdrpp-iak-${VER}-debian-trixie-aarch64/sdrpp_debian_pkg.deb                      sdrpp_all/sdrpp-iak-${VER}-debian-trixie-aarch64.deb
            mv sdrpp-iak-${VER}-debian-sid-amd64/sdrpp_debian_pkg.deb                           sdrpp_all/sdrpp-iak-${VER}-debian-sid-amd64.deb
            mv sdrpp-iak-${VER}-debian-sid-aarch64/sdrpp_debian_pkg.deb                         sdrpp_all/sdrpp-iak-${VER}-debian-sid-aarch64.deb
            mv sdrpp-iak-${VER}-ubuntu-focal-amd64/sdrpp_debian_pkg.deb                         sdrpp_all/sdrpp-iak-${VER}-ubuntu-focal-amd64.deb
            mv sdrpp-iak-${VER}-ubuntu-focal-aarch64/sdrpp_debian_pkg.deb                       sdrpp_all/sdrpp-iak-${VER}-ubuntu-focal-aarch64.deb
            mv sdrpp-iak-${VER}-ubuntu-jammy-amd64/sdrpp_debian_pkg.deb                         sdrpp_all/sdrpp-iak-${VER}-ubuntu-jammy-amd64.deb
            mv sdrpp-iak-${VER}-ubuntu-jammy-aarch64/sdrpp_debian_pkg.deb                       sdrpp_all/sdrpp-iak-${VER}-ubuntu-jammy-aarch64.deb
            mv sdrpp-iak-${VER}-ubuntu-noble-amd64/sdrpp_debian_pkg.deb                         sdrpp_all/sdrpp-iak-${VER}-ubuntu-noble-amd64.deb
            mv sdrpp-iak-${VER}-ubuntu-noble-aarch64/sdrpp_debian_pkg.deb                       sdrpp_all/sdrpp-iak-${VER}-ubuntu-noble-aarch64.deb
            # AppImages are optional on PRs (build_appimage may have been skipped).
            [ -d sdrpp-iak-${VER}-linux-appimage-x86_64 ]  && mv sdrpp-iak-${VER}-linux-appimage-x86_64/sdrpp-iak-${VER}-x86_64.AppImage   sdrpp_all/sdrpp-iak-${VER}-linux-x86_64.AppImage   || true
            [ -d sdrpp-iak-${VER}-linux-appimage-aarch64 ] && mv sdrpp-iak-${VER}-linux-appimage-aarch64/sdrpp-iak-${VER}-aarch64.AppImage sdrpp_all/sdrpp-iak-${VER}-linux-aarch64.AppImage || true
            mv sdrpp-iak-${VER}-android-arm-debug/sdrpp-iak-arm-debug.apk                         sdrpp_all/sdrpp-iak-${VER}-android-arm-debug.apk
            mv sdrpp-iak-${VER}-android-x86-debug/sdrpp-iak-x86-debug.apk                         sdrpp_all/sdrpp-iak-${VER}-android-x86-debug.apk
            # Signed release APKs are optional when the Android keystore secret is unavailable.
            [ -d sdrpp-iak-${VER}-android-arm-release ] && mv sdrpp-iak-${VER}-android-arm-release/sdrpp-iak-arm-release.apk sdrpp_all/sdrpp-iak-${VER}-android-arm-release.apk || true
            [ -d sdrpp-iak-${VER}-android-x86-release ] && mv sdrpp-iak-${VER}-android-x86-release/sdrpp-iak-x86-release.apk sdrpp_all/sdrpp-iak-${VER}-android-x86-release.apk || true

        - uses: actions/upload-artifact@v4
          with:
            name: sdrpp-iak-${{ needs.get_version.outputs.version_full }}-all
            path: sdrpp_all/

    update_nightly_release:
        needs: [get_version, create_full_archive]
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

        steps:
        - name: Download All Builds
          uses: actions/download-artifact@v4

        - name: Create or Update Nightly Release
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VER: ${{ needs.get_version.outputs.version_full }}
          run: |
            NOTES="Nightly build — v${VER} (commit ${{ github.sha }}) built $(date -u '+%Y-%m-%d %H:%M UTC')"

            # Create the release if it does not exist yet
            gh release view nightly -R ${{github.repository}} 2>/dev/null || \
              gh release create nightly -R ${{github.repository}} --title "Nightly Build" --notes "$NOTES" --prerelease

            # Always refresh the release notes so they reflect the latest commit
            gh release edit nightly -R ${{github.repository}} --notes "$NOTES"

            # Remove assets from the previous build that are no longer produced
            gh release view nightly -R ${{github.repository}} --json assets --jq '.assets[].name' | while read -r asset; do
              if [ -n "$asset" ] && [ ! -f "sdrpp-iak-${VER}-all/$asset" ]; then
                gh release delete-asset nightly "$asset" -R ${{github.repository}} --yes
              fi
            done

            # Upload artifacts (--clobber overwrites existing files with the same name)
            gh release upload nightly sdrpp-iak-${VER}-all/* -R ${{github.repository}} --clobber

    create_release:
        needs: [get_version, validate_tag, create_full_archive]
        runs-on: ubuntu-latest
        if: github.ref_type == 'tag'

        steps:
        - name: Download All Builds
          uses: actions/download-artifact@v4

        - name: Publish GitHub Release
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VER: ${{ needs.get_version.outputs.version_full }}
          run: |
            # Mark alpha/beta/rc tags as pre-releases on GitHub.
            PRERELEASE_FLAG=""
            if echo "${{ github.ref_name }}" | grep -qE '\-(alpha|beta|rc)[0-9]*$'; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "${{ github.ref_name }}" \
              sdrpp-iak-${VER}-all/* \
              --title "SDR++ iak ${{ github.ref_name }}" \
              --generate-notes \
              $PRERELEASE_FLAG \
              --repo ${{ github.repository }}

    check_spelling:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Install codespell
          run: sudo apt update -y && sudo apt install -y codespell
        
        - name: Running codespell
          run: cd $GITHUB_WORKSPACE && codespell -q 2 || true

    check_formatting:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
        
        - name: Run check_clang_format
          run: cd $GITHUB_WORKSPACE && chmod +x ./check_clang_format.sh && ./check_clang_format.sh || true
