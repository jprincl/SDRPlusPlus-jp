    build_android:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Fetch container
          working-directory: ${{runner.workspace}}
          run: git clone https://github.com/bubnikv/android-sdr-kit-iak android-sdr-kit
        
        - name: Build container
          working-directory: ${{runner.workspace}}/android-sdr-kit
          run: docker build --progress=plain -t android-sdr-kit .

        - name: Build Debug APKs
          run: docker run --name build -v $GITHUB_WORKSPACE:/root/SDRPlusPlus android-sdr-kit /bin/bash -l -c "cd /root/SDRPlusPlus/android && gradle --info assembleArmDebug assembleX86Debug"

        - name: Recover Debug APKs
          working-directory: ${{runner.workspace}}
          run: |
            docker cp build:/root/SDRPlusPlus/android/app/build/outputs/apk/arm/debug/app-arm-debug.apk ./sdrpp_arm_debug.apk
            docker cp build:/root/SDRPlusPlus/android/app/build/outputs/apk/x86/debug/app-x86-debug.apk ./sdrpp_x86_debug.apk

        - name: Save ARM Debug APK
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp_android_arm_debug
              path: ${{runner.workspace}}/sdrpp_arm_debug.apk

        - name: Save x86 Debug APK
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp_android_x86_debug
              path: ${{runner.workspace}}/sdrpp_x86_debug.apk

        - name: Decode Keystore
          id: check_signing
          run: |
            if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
              echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{runner.workspace}}/release.keystore
              echo "has_keystore=true" >> $GITHUB_OUTPUT
            else
              echo "has_keystore=false" >> $GITHUB_OUTPUT
            fi
          env:
            ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

        - name: Build Signed Release APKs
          if: steps.check_signing.outputs.has_keystore == 'true'
          env:
            ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
            ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          run: |
            docker rm build
            docker run --name build_release \
              -e ANDROID_KEYSTORE_FILE=/root/release.keystore \
              -e ANDROID_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
              -e ANDROID_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -e ANDROID_KEY_PASSWORD="$ANDROID_KEY_PASSWORD" \
              -v $GITHUB_WORKSPACE:/root/SDRPlusPlus \
              -v ${{runner.workspace}}/release.keystore:/root/release.keystore \
              android-sdr-kit /bin/bash -l -c "cd /root/SDRPlusPlus/android && gradle --info assembleArmRelease assembleX86Release"

        - name: Recover Release APKs
          if: steps.check_signing.outputs.has_keystore == 'true'
          working-directory: ${{runner.workspace}}
          run: |
            docker cp build_release:/root/SDRPlusPlus/android/app/build/outputs/apk/arm/release/app-arm-release.apk ./sdrpp_arm_release.apk
            docker cp build_release:/root/SDRPlusPlus/android/app/build/outputs/apk/x86/release/app-x86-release.apk ./sdrpp_x86_release.apk

        - name: Save ARM Release APK
          if: steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp_android_arm_release
              path: ${{runner.workspace}}/sdrpp_arm_release.apk

        - name: Save x86 Release APK
          if: steps.check_signing.outputs.has_keystore == 'true'
          uses: actions/upload-artifact@v4
          with:
              name: sdrpp_android_x86_release
              path: ${{runner.workspace}}/sdrpp_x86_release.apk

    create_full_archive:
        needs: [
          'build_windows',
          'build_macos_intel',
          'build_macos_arm',
          'build_debian_bullseye_amd64',
          'build_debian_bullseye_aarch64',
          'build_debian_bookworm_amd64',
          'build_debian_bookworm_aarch64',
          'build_debian_trixie_amd64',
          'build_debian_trixie_aarch64',
          'build_debian_sid_amd64',
          'build_debian_sid_aarch64',
          'build_ubuntu_focal_amd64',
          'build_ubuntu_focal_aarch64',
          'build_ubuntu_jammy_amd64',
          'build_ubuntu_jammy_aarch64',
          'build_ubuntu_noble_amd64',
          'build_ubuntu_noble_aarch64',
          'build_android'
        ]
        runs-on: ubuntu-latest

        steps:
        - name: Download All Builds
          uses: actions/download-artifact@v4

        - name: Create Archive
          run: >
            mkdir sdrpp_all && 
            mv sdrpp_windows_x64/sdrpp_windows_x64.zip sdrpp_all/ && 
            mv sdrpp_macos_intel/sdrpp_macos_intel.zip sdrpp_all/ && 
            mv sdrpp_macos_arm/sdrpp_macos_arm.zip sdrpp_all/ && 
            mv sdrpp_debian_bullseye_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_bullseye_amd64.deb &&
            mv sdrpp_debian_bullseye_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_bullseye_aarch64.deb &&
            mv sdrpp_debian_bookworm_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_bookworm_amd64.deb && 
            mv sdrpp_debian_bookworm_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_bookworm_aarch64.deb && 
            mv sdrpp_debian_trixie_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_trixie_amd64.deb && 
            mv sdrpp_debian_trixie_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_trixie_aarch64.deb && 
            mv sdrpp_debian_sid_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_sid_amd64.deb && 
            mv sdrpp_debian_sid_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_debian_sid_aarch64.deb && 
            mv sdrpp_ubuntu_focal_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_focal_amd64.deb &&
            mv sdrpp_ubuntu_focal_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_focal_aarch64.deb &&
            mv sdrpp_ubuntu_jammy_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_jammy_amd64.deb &&
            mv sdrpp_ubuntu_jammy_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_jammy_aarch64.deb &&
            mv sdrpp_ubuntu_noble_amd64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_noble_amd64.deb &&
            mv sdrpp_ubuntu_noble_aarch64/sdrpp_debian_amd64.deb sdrpp_all/sdrpp_ubuntu_noble_aarch64.deb &&
            mv sdrpp_android_arm_debug/sdrpp_arm_debug.apk sdrpp_all/sdrpp_arm_debug.apk &&
            mv sdrpp_android_x86_debug/sdrpp_x86_debug.apk sdrpp_all/sdrpp_x86_debug.apk &&
            ([ -d sdrpp_android_arm_release ] && mv sdrpp_android_arm_release/sdrpp_arm_release.apk sdrpp_all/sdrpp_arm_release.apk || true) &&
            ([ -d sdrpp_android_x86_release ] && mv sdrpp_android_x86_release/sdrpp_x86_release.apk sdrpp_all/sdrpp_x86_release.apk || true)

        - uses: actions/upload-artifact@v4
          with:
            name: sdrpp_all
            path: sdrpp_all/

    update_nightly_release:
        needs: [create_full_archive]
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

        steps:
        - name: Download All Builds
          uses: actions/download-artifact@v4
          
        - name: Create or Update Nightly Release
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            # Check if nightly release exists, create if not
            gh release view nightly -R ${{github.repository}} 2>/dev/null || gh release create nightly -R ${{github.repository}} --title "Nightly Build" --notes "Automated nightly build from CI - Built from commit ${{ github.sha }}" --prerelease
            
            # Keep the nightly release assets in sync with the current build output.
            gh release view nightly -R ${{github.repository}} --json assets --jq '.assets[].name' | while read -r asset; do
              if [ -n "$asset" ] && [ ! -f "sdrpp_all/$asset" ]; then
                gh release delete-asset nightly "$asset" -R ${{github.repository}} --yes
              fi
            done

            # Upload artifacts (--clobber overwrites existing files)
            gh release upload nightly sdrpp_all/* -R ${{github.repository}} --clobber

    check_spelling:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Install codespell
          run: sudo apt update -y && sudo apt install -y codespell
        
        - name: Running codespell
          run: cd $GITHUB_WORKSPACE && codespell -q 2 || true

    check_formatting:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
        
        - name: Run check_clang_format
          run: cd $GITHUB_WORKSPACE && chmod +x ./check_clang_format.sh && ./check_clang_format.sh || true
